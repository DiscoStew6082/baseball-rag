version: 1
description: >
  Golden evaluation set for grounded baseball-rag behavior. Each item names the
  intended route, expected answer shape, provenance requirements, and edge cases
  that should remain unsupported rather than guessed.
minimum_pass_rate: 0.85
questions:
  - id: stat_rbi_1962
    question: "who had the most RBIs in 1962"
    intent: stat_query
    expected_answer_contains: ["Davis", "153", "RBI"]
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: stat_hr_1970
    question: "who had the most HRs in 1970"
    intent: stat_query
    expected_answer_contains: ["1970", "HR"]
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: stat_career_hr
    question: "career home run leaders"
    intent: stat_query
    expected_answer_contains: ["All-time career HR leaders", "Ruth"]
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: stat_career_rbi
    question: "career RBI leaders"
    intent: stat_query
    expected_answer_contains: ["All-time career RBI leaders"]
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: stat_range_1960_1980_rbi
    question: "who had most RBIs between 1960-1980"
    intent: stat_query
    expected_answer_contains: ["1960-1980", "RBI"]
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: stat_decade_1970s_hr
    question: "most HRs in the seventies"
    intent: stat_query
    expected_answer_contains: ["1970-1979", "HR"]
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: stat_decade_1980s_sb
    question: "stolen base leaders in the 1980s"
    intent: stat_query
    expected_answer_contains: ["1980-1989", "SB"]
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: stat_single_player_judge_2022_hr
    question: "how many HRs did Aaron Judge have in 2022"
    intent: stat_query
    expected_answer_contains: ["Judge", "2022", "62", "HR"]
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: stat_single_player_acuna_suffix
    question: "how many home runs did Ronald Acuna Jr. have in 2023"
    intent: stat_query
    expected_answer_contains: ["Acuna", "2023", "41", "HR"]
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: stat_single_player_olson_2023_rbi
    question: "Matt Olson RBI in 2023"
    intent: stat_query
    expected_answer_contains: ["Olson", "2023", "139", "RBI"]
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: stat_player_missing
    question: "how many HRs did Totally Fakeplayer have in 2022"
    intent: stat_query
    expected_unsupported: true
    expected_answer_contains: ["No HR result found"]
    required_sources: ["duckdb"]
  - id: stat_unsupported_column
    question: "who led the league in vibes in 1999"
    expected_unsupported: true
    expected_answer_contains: ["grounded", "specific"]
  - id: stat_sql_injection_stat
    question: "career HR; drop table batting leaders"
    expected_unsupported: true
    notes: "Must not execute model/user-controlled stat text as SQL."
  - id: stat_sql_injection_team
    question: "who played for the Braves%' OR 1=1 -- in 1936"
    intent: freeform_query
    expected_sql_parameterized: true
    notes: "Team names must be bound parameters."
  - id: freeform_braves_1936
    question: "who played for the Braves in 1936"
    intent: freeform_query
    expected_min_rows: 10
    required_sources: ["duckdb"]
    expected_sql_contains: ["JOIN batting", "JOIN teams", "?"]
  - id: freeform_yankees_1950
    question: "who played for the Yankees in 1950"
    intent: freeform_query
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: freeform_dodgers_1955
    question: "who played for the Dodgers in 1955"
    intent: freeform_query
    expected_min_rows: 10
    required_sources: ["duckdb"]
  - id: freeform_triple_crown
    question: "who won the Triple Crown and which years"
    intent: freeform_query
    expected_sql_parameterized: true
    expected_min_rows: 1
    notes: "Requires typed leader_stats HR, RBI, AVG with AVG minimum sample size."
  - id: freeform_pitchers_300_wins
    question: "list all pitchers with over 300 wins"
    intent: freeform_query
    expected_min_rows: 1
    required_sources: ["duckdb"]
  - id: freeform_lowest_era_qualified_1968
    question: "who had the lowest ERA in 1968 with enough innings"
    intent: freeform_query
    expected_sql_parameterized: true
    minimum_sample_size: "IPouts >= 300"
  - id: min_sample_avg_2024
    question: "who had the highest batting average in 2024 with at least 100 at bats"
    intent: freeform_query
    minimum_sample_size: "AB >= 100"
    expected_sql_parameterized: true
  - id: min_sample_avg_no_qualifier
    question: "highest batting average in 1894"
    intent: freeform_query
    minimum_sample_size: "AB >= 100"
    notes: "Default AVG leader specs should use a minimum AB guard."
  - id: ambiguous_player_williams
    question: "how many home runs did Williams have in 1941"
    intent: stat_query
    expected_unsupported: true
    notes: "Last-name-only query is ambiguous; avoid silently picking Ted Williams."
  - id: ambiguous_player_robinson
    question: "what teams did Robinson play for"
    expected_unsupported: true
    notes: "Ambiguous player surname without conversation context."
  - id: ambiguous_player_johnson
    question: "who was Johnson"
    expected_unsupported: true
    notes: "Do not infer Walter/Randy/other Johnson."
  - id: player_bio_babe_ruth
    question: "who was Babe Ruth"
    intent: player_biography
    expected_answer_contains: ["Babe Ruth"]
    required_sources: ["chroma"]
  - id: player_bio_ted_williams
    question: "tell me about Ted Williams"
    intent: player_biography
    expected_answer_contains: ["Ted Williams"]
    required_sources: ["chroma"]
  - id: player_bio_willie_mays
    question: "who was Willie Mays"
    intent: player_biography
    expected_answer_contains: ["Willie Mays"]
    required_sources: ["chroma"]
  - id: player_bio_hank_aaron
    question: "tell me about Hank Aaron"
    intent: player_biography
    expected_answer_contains: ["Hank Aaron"]
    required_sources: ["chroma"]
  - id: player_bio_mickey_mantle
    question: "who was Mickey Mantle"
    intent: player_biography
    expected_answer_contains: ["Mickey Mantle"]
    required_sources: ["chroma"]
  - id: stat_definition_ops
    question: "what is OPS"
    intent: general_explanation
    expected_answer_contains: ["on-base", "slugging"]
    required_sources: ["chroma"]
  - id: stat_definition_whip
    question: "what does WHIP mean"
    intent: general_explanation
    expected_answer_contains: ["walks", "hits", "innings"]
    required_sources: ["chroma"]
  - id: stat_definition_era
    question: "explain ERA"
    intent: general_explanation
    expected_answer_contains: ["earned run"]
    required_sources: ["chroma"]
  - id: stat_definition_rbi
    question: "what is an RBI"
    intent: general_explanation
    expected_answer_contains: ["run batted in"]
    required_sources: ["chroma"]
  - id: stat_definition_stolen_base
    question: "what is a stolen base"
    intent: general_explanation
    expected_answer_contains: ["stolen base"]
    required_sources: ["chroma"]
  - id: unsupported_future_season
    question: "who will lead MLB in home runs in 2027"
    expected_unsupported: true
    notes: "Future predictions are outside grounded historical data."
  - id: unsupported_betting
    question: "which team should I bet on tonight"
    expected_unsupported: true
    notes: "No betting advice or live odds source."
  - id: unsupported_injury_news
    question: "is Aaron Judge injured today"
    expected_unsupported: true
    notes: "No live news source."
  - id: unsupported_live_score
    question: "what is the Yankees score right now"
    expected_unsupported: true
    notes: "No live scoreboard source."
  - id: unsupported_contract
    question: "what is Shohei Ohtani's current salary"
    expected_unsupported: true
    notes: "Not in Lahman-derived stats/corpus."
  - id: source_manifest_present_stat
    question: "who had the most RBIs in 1962"
    required_source_manifest_fields: ["dataset", "files", "coverage", "download"]
  - id: source_manifest_present_freeform
    question: "who played for the Braves in 1936"
    required_source_manifest_fields: ["dataset", "files", "coverage", "download"]
  - id: sql_visible_freeform
    question: "who played for the Yankees in 1950"
    expected_sql_visible: true
  - id: sql_visible_api
    question: "who played for the Dodgers in 1955"
    expected_api_fields: ["answer", "intent", "sources", "warnings", "unsupported"]
  - id: row_count_reasonable_1962_rbi
    question: "who had the most RBIs in 1962"
    expected_min_rows: 10
    expected_max_rows: 10
  - id: row_count_freeform_limit
    question: "list players who played in 2022"
    expected_max_rows: 1000
    notes: "Freeform results must respect MAX_ROWS."
  - id: team_history_boston_braves
    question: "who played for the Braves in 1936"
    intent: freeform_query
    expected_answer_contains: ["Braves"]
    notes: "Historical team hint should keep 1936 Braves grounded."
  - id: team_history_brooklyn_dodgers
    question: "who played for the Dodgers in 1947"
    intent: freeform_query
    expected_min_rows: 10
  - id: fielding_of_1983
    question: "outfield putouts leaders in 1983"
    intent: stat_query
    expected_answer_contains: ["PO"]
    expected_min_rows: 1
  - id: pitching_wins_career
    question: "career pitching wins leaders"
    intent: freeform_query
    expected_min_rows: 10
  - id: pitching_era_qualified
    question: "best qualified ERA seasons"
    intent: freeform_query
    minimum_sample_size: "IPouts >= 300"
  - id: batting_average_qualified
    question: "best qualified batting average seasons"
    intent: freeform_query
    minimum_sample_size: "AB >= 100"
  - id: unsupported_opinion
    question: "who is the greatest baseball player ever"
    expected_unsupported: true
    notes: "Subjective unless framed as a specific grounded metric."
  - id: unsupported_non_baseball
    question: "who won the NBA finals in 2020"
    expected_unsupported: true
  - id: unsupported_schema_unknown
    question: "show me Statcast barrel rate leaders"
    expected_unsupported: true
    notes: "Statcast fields are not in this local dataset."
  - id: unsupported_minor_leagues
    question: "who led Triple-A in home runs in 2021"
    expected_unsupported: true
    notes: "Dataset is MLB-focused."
