name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff && ruff check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install mypy types-requests types-PyYAML
      - run: mypy src/baseball_rag/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Install all dependencies (prod + dev) directly via pip — avoids uv venv PATH issues
      - run: pip install pytest pytest-cov coverage requests duckdb chromadb typer fastapi gradio httpx mypy types-requests types-PyYAML ruff
      - run: pip install -e .
      # Download NeuML/baseballdata CSVs (runtime deps — not stored in repo)
      - run: python -c "from baseball_rag.db.download import download_all; download_all()"
      - run: python -m pytest tests/ --ignore=tests/test_db_download.py --cov=baseball_rag --cov-report=xml --cov-report=term-missing -v
      - uses: codecov/codecov-action@v4
