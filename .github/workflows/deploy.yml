name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]

jobs:
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry (for storing the image)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image to GHCR
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/discostew6082/baseball-rag:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push to HuggingFace Spaces (Docker) via container registry
      - name: Push to HF Spaces Docker Registry
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "$HF_TOKEN" | docker login ghcr.io -u DiscoStew6082 --password-stdin
          docker tag ghcr.io/discostew6082/baseball-rag:latest ghcr.io/huggingface/spaces-org/discostew6082__baseball-rag:latest
          docker push ghcr.io/huggingface/spaces-org/discostew6082__baseball-rag:latest